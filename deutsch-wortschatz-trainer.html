<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Deutsch Wortschatz — Trainer</title>
<style>
  :root{
    --ink:#262420; --paper:#FAF7F1; --card:#FFFFFF;
    --line:#E4DECF; --accent:#7A4F2B; --accent-soft:#EFE3D2;
    --good:#3B6D11; --good-bg:#EAF3DE;
    --hard:#A32D2D; --hard-bg:#FCEBEB;
    --mid:#854F0B; --mid-bg:#FAEEDA;
    --muted:#8A8377;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:"Iowan Old Style","Palatino Linotype",Georgia,serif;
    background:var(--paper); color:var(--ink); padding:24px 16px 60px;
  }
  .wrap{max-width:640px; margin:0 auto;}
  header{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:18px; flex-wrap:wrap; gap:8px;}
  h1{font-size:22px; font-weight:600; margin:0; letter-spacing:0.2px;}
  .sub{font-family:Arial,Helvetica,sans-serif; font-size:12px; color:var(--muted); margin-top:2px;}
  nav{display:flex; gap:6px; margin-bottom:18px; font-family:Arial,sans-serif;}
  nav button{
    flex:1; font-family:inherit; font-size:13px; padding:9px 6px; cursor:pointer;
    background:var(--card); border:1px solid var(--line); border-radius:8px; color:var(--ink);
  }
  nav button.active{background:var(--accent); color:#fff; border-color:var(--accent);}

  .stats{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:14px; font-family:Arial,sans-serif;}
  .stat{background:var(--card); border:1px solid var(--line); border-radius:10px; padding:10px 8px; text-align:center;}
  .stat b{display:block; font-size:18px; font-family:Georgia,serif;}
  .stat span{font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.4px;}

  .source-bar{font-family:Arial,sans-serif; font-size:11px; color:var(--muted); margin-bottom:16px; line-height:1.6;}
  .source-bar b{color:var(--accent); font-weight:600;}
  .source-tag{display:inline-block; background:var(--card); border:1px solid var(--line); border-radius:6px; padding:2px 7px; margin-right:6px;}
  .source-tag.ok::before{content:"●"; color:var(--good); margin-right:4px;}
  .source-tag.fallback::before{content:"●"; color:var(--mid); margin-right:4px;}

  #view{min-height:240px;}

  .card{
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:36px 24px; text-align:center; cursor:pointer; user-select:none;
    min-height:200px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
  }
  .card .cat{font-family:Arial,sans-serif; font-size:11px; color:var(--accent); text-transform:uppercase; letter-spacing:0.5px;}
  .card .word{font-size:30px; font-weight:600;}
  .card .ex{font-size:14px; color:var(--muted); font-style:italic; max-width:420px;}
  .card .hint{font-family:Arial,sans-serif; font-size:11px; color:var(--muted); margin-top:6px;}
  .card .answer{font-size:20px; color:var(--accent);}
  .card .pos{font-family:Arial,sans-serif; font-size:10px; color:var(--muted); text-transform:uppercase;}

  .grade-row{display:flex; gap:8px; margin-top:16px; font-family:Arial,sans-serif;}
  .grade-row button{
    flex:1; padding:12px 4px; border-radius:10px; border:1px solid var(--line); cursor:pointer; font-size:13px; font-weight:600;
  }
  .g-again{background:var(--hard-bg); color:var(--hard); border-color:var(--hard);}
  .g-hard{background:var(--mid-bg); color:var(--mid); border-color:var(--mid);}
  .g-good{background:var(--good-bg); color:var(--good); border-color:var(--good);}
  .g-easy{background:var(--accent-soft); color:var(--accent); border-color:var(--accent);}

  .empty{text-align:center; padding:50px 20px; font-family:Arial,sans-serif; color:var(--muted);}
  .empty b{display:block; font-size:16px; color:var(--ink); margin-bottom:6px; font-family:Georgia,serif;}

  .progressbar{height:5px; background:var(--line); border-radius:3px; overflow:hidden; margin-bottom:18px;}
  .progressbar div{height:100%; background:var(--accent);}

  .browse-list{display:flex; flex-direction:column; gap:6px; font-family:Arial,sans-serif;}
  .browse-row{
    display:flex; justify-content:space-between; align-items:center; gap:10px;
    background:var(--card); border:1px solid var(--line); border-radius:8px; padding:10px 12px; font-size:13px;
  }
  .browse-row .de{font-family:Georgia,serif; font-weight:600; font-size:14px;}
  .browse-row .box{font-size:10px; padding:3px 7px; border-radius:6px; background:var(--accent-soft); color:var(--accent); white-space:nowrap;}
  .cat-head{font-family:Arial,sans-serif; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; color:var(--muted); margin:14px 0 4px;}
  .cat-filter{font-family:Arial,sans-serif; font-size:12px; padding:6px 10px; border-radius:8px; border:1px solid var(--line); background:var(--card); color:var(--ink); margin-bottom:14px; width:100%;}

  .reset-link{font-family:Arial,sans-serif; font-size:11px; color:var(--muted); text-align:center; margin-top:30px; cursor:pointer; text-decoration:underline;}
</style>
</head>

<div class="wrap">

  <nav>

</div>

<script>
// ---- Configuration: list of CSV lookup files this app will try to load ----
// To add a new category later: drop a new CSV (columns: de,en,cat,ex,pos) next to
// this HTML file, add its filename here, and (optionally) add its data to the
// fallback bundle above so it also works when opened without a local server.
const CSV_FILES = ["core-a2-b1.csv", "business-office.csv", "frequency-862.csv", "extra-topics.csv"];

const DAILY_NEW_LIMIT = 12;
const STORAGE_KEY = "progress-v2";
let progress = {};
let queue = [];
let current = null;
let revealed = false;
let activeTab = "study";
let browseFilter = "alle";
let WORD_DATA = [];
let freshPool = [];
let freshOffset = 0;
let currentSessionSize = 0;
let direction = "de-en"; // "de-en" = recognize German, "en-de" = produce German
let lang = localStorage.getItem("lang-pref") || "en"; // "en" or "tr" — target language
const loadStatus = {};

function keyFor(word){ return word.de + "|" + direction + "|" + lang; }
function targetField(){ return lang === "tr" ? "tr" : "en"; }
function todayStamp(){ return Math.floor(Date.now()/86400000); }

// ---- Minimal RFC4126-style CSV parser (handles quoted fields with commas) ----
function parseCSV(text){
  const rows = [];
  let row = [], field = "", inQuotes = false;
  for(let i=0;i<text.length;i++){
    const c = text[i];
    if(inQuotes){
      if(c === '"'){
        if(text[i+1] === '"'){ field += '"'; i++; }
        else inQuotes = false;
      } else field += c;
    } else {
      if(c === '"') inQuotes = true;
      else if(c === ','){ row.push(field); field = ""; }
      else if(c === '\n'){ row.push(field); rows.push(row); row = []; field = ""; }
      else if(c === '\r'){ /* skip */ }
      else field += c;
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  if(!rows.length) return [];
  const header = rows[0].map(h=>h.trim());
  return rows.slice(1).filter(r=>r.length>1 || r[0]).map(r=>{
    const obj = {};
    header.forEach((h,idx)=>{ obj[h] = (r[idx]||"").trim(); });
    return obj;
  });
}

async function loadWordData(){
  const fallback = JSON.parse(document.getElementById("fallback-data").textContent);
  const seen = new Set();
  const sourceResults = [];

  for(const filename of CSV_FILES){
    let rows = null;
    let mode = "fallback";
    try{
      const res = await fetch(filename);
      if(res.ok){
        const text = await res.text();
        rows = parseCSV(text);
        mode = "fetched";
      }
    }catch(e){ /* file:// fetch blocked, or file missing — fall back below */ }

    if(!rows || !rows.length){
      rows = fallback[filename] || [];
      mode = rows.length ? "fallback" : "missing";
    }

    let added = 0;
    rows.forEach(r=>{
      if(!r.de || seen.has(r.de)) return;
      seen.add(r.de);
      WORD_DATA.push({de:r.de, en:r.en, tr:r.tr||"", cat:r.cat||"Sonstiges", ex:r.ex||"", pos:r.pos||""});
      added++;
    });
    sourceResults.push({filename, mode, count: added});
  }
  return sourceResults;
}

function renderSourceBar(results){
  const bar = document.getElementById("sourceBar");
  bar.innerHTML = results.map(r=>{
    const cls = r.mode === "fetched" ? "ok" : (r.mode === "fallback" ? "fallback" : "ok");
    const label = r.mode === "fetched" ? "live" : (r.mode === "fallback" ? "eingebettet" : "fehlt");
    return `<span class="source-tag ${cls}">${r.filename} · ${r.count} (${label})</span>`;
  }).join(" ");
}

async function loadProgress(){
  try{
    const r = localStorage.getItem(STORAGE_KEY);
    progress = r ? JSON.parse(r) : {};
  }catch(e){ progress = {}; }
}
async function saveProgress(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); }
  catch(e){ console.error("save failed", e); }
}

function ensureEntry(word){
  const k = keyFor(word);
  if(!progress[k]) progress[k] = {box:0, due:todayStamp(), seen:0, streak:0};
  return progress[k];
}

const BOX_INTERVAL = [0,1,2,4,8,16];

function buildQueue(offset){
  const today = todayStamp();
  const due = [];
  const fresh = [];
  WORD_DATA.forEach(w=>{
    const p = progress[keyFor(w)];
    if(p){
      if(p.due <= today) due.push(w);
    } else {
      fresh.push(w);
    }
  });
  due.sort(()=>Math.random()-0.5);
  freshPool = fresh;
  freshOffset = offset || 0;
  const newOnes = freshPool.slice(freshOffset, freshOffset + DAILY_NEW_LIMIT);
  freshOffset += newOnes.length;
  queue = due.concat(newOnes);
}

function loadMore(){
  const newOnes = freshPool.slice(freshOffset, freshOffset + DAILY_NEW_LIMIT);
  freshOffset += newOnes.length;
  queue = queue.concat(newOnes);
  currentSessionSize += newOnes.length;
  current = queue[0] || null;
  renderStudy();
}

function grade(word, level){
  const p = ensureEntry(word);
  p.seen += 1;
  if(level === "again"){ p.box = 0; p.streak = 0; }
  else if(level === "hard"){ p.box = Math.max(0, p.box); p.streak += 1; }
  else if(level === "good"){ p.box = Math.min(5, p.box+1); p.streak += 1; }
  else if(level === "easy"){ p.box = Math.min(5, p.box+2); p.streak += 1; }
  p.due = todayStamp() + BOX_INTERVAL[p.box];
  saveProgress();
}

function computeStats(){
  const today = todayStamp();
  let learned = 0, dueToday = 0, mastered = 0;
  WORD_DATA.forEach(w=>{
    const p = progress[keyFor(w)];
    if(p){
      learned++;
      if(p.due <= today) dueToday++;
      if(p.box >= 4) mastered++;
    }
  });
  return {learned, total: WORD_DATA.length, dueToday, mastered};
}

function renderStats(){
  const s = computeStats();
  document.getElementById("stats").innerHTML = `
    <div class="stat"><b>${s.learned}</b><span>gelernt</span></div>
    <div class="stat"><b>${s.total - s.learned}</b><span>neu</span></div>
    <div class="stat"><b>${s.mastered}</b><span>gefestigt</span></div>
    <div class="stat"><b>${s.total}</b><span>total</span></div>
  `;
}

function renderStudy(){
  const view = document.getElementById("view");
  if(queue.length === 0){
    const remaining = freshPool.length - freshOffset;
    if(remaining > 0){
      view.innerHTML = `<div class="empty"><b>Erste Runde geschafft!</b>Du kannst hier aufhören oder direkt weitermachen.<br><span style="display:inline-block;margin-top:14px;">${remaining} weitere neue Wörter warten.</span>
        <div style="margin-top:18px;"><button id="loadMoreBtn" style="font-family:Arial,sans-serif;font-size:14px;font-weight:600;padding:10px 18px;border-radius:10px;border:1px solid var(--accent);background:var(--accent-soft);color:var(--accent);cursor:pointer;">Weiter üben (+${Math.min(DAILY_NEW_LIMIT, remaining)})</button></div>
      </div>`;
      document.getElementById("loadMoreBtn").onclick = loadMore;
    } else {
      view.innerHTML = `<div class="empty"><b>Für heute geschafft!</b>Alle Wörter sind durchgenommen. Komm morgen wieder für die Wiederholung.<br>Du kannst inzwischen unter "Alle Wörter" stöbern.</div>`;
    }
    return;
  }
  const seenSoFar = currentSessionSize - queue.length;
  const target = current[targetField()] || current.en;
  const prompt = direction === "de-en" ? current.de : target;
  const answer = direction === "de-en" ? target : current.de;
  view.innerHTML = `
    <div class="progressbar"><div style="width:${(seenSoFar/currentSessionSize*100)||0}%"></div></div>
    <div class="card" id="cardEl">
      <div class="cat">${current.cat}${current.pos ? " · " + current.pos : ""}</div>
      <div class="word">${prompt}</div>
      ${revealed ? `<div class="answer">${answer}</div>${current.ex ? `<div class="ex">${current.ex}</div>` : ""}` : `<div class="hint">Tippen zum Aufdecken</div>`}
    </div>
    <div class="grade-row" style="${revealed ? '' : 'visibility:hidden'}">
      <button class="g-again" data-g="again">Nochmal</button>
      <button class="g-hard" data-g="hard">Schwer</button>
      <button class="g-good" data-g="good">Gut</button>
      <button class="g-easy" data-g="easy">Leicht</button>
    </div>
  `;
  document.getElementById("cardEl").onclick = ()=>{ revealed = true; renderStudy(); };
  document.querySelectorAll(".grade-row button").forEach(b=>{
    b.onclick = (e)=>{
      e.stopPropagation();
      grade(current, b.dataset.g);
      queue.shift();
      revealed = false;
      current = queue[0] || null;
      renderStats();
      renderStudy();
    };
  });
}

function renderBrowse(){
  const view = document.getElementById("view");
  const allCats = Array.from(new Set(WORD_DATA.map(w=>w.cat)));
  let html = `<select class="cat-filter" id="catFilter"><option value="alle">Alle Kategorien</option>${allCats.map(c=>`<option value="${c}" ${browseFilter===c?"selected":""}>${c}</option>`).join("")}</select>`;
  const cats = {};
  WORD_DATA.forEach(w=>{
    if(browseFilter !== "alle" && w.cat !== browseFilter) return;
    (cats[w.cat] = cats[w.cat]||[]).push(w);
  });
  Object.keys(cats).forEach(cat=>{
    html += `<div class="cat-head">${cat}</div><div class="browse-list">`;
    cats[cat].forEach(w=>{
      const p = progress[keyFor(w)];
      const label = p ? (p.box>=4 ? "gefestigt" : "Box " + p.box) : "neu";
      html += `<div class="browse-row"><div><span class="de">${w.de}</span> — ${w[targetField()] || w.en}</div><div class="box">${label}</div></div>`;
    });
    html += `</div>`;
  });
  view.innerHTML = html;
  document.getElementById("catFilter").onchange = (e)=>{ browseFilter = e.target.value; renderBrowse(); };
}

function render(){
  if(activeTab === "study") renderStudy();
  else renderBrowse();
}

document.querySelectorAll("nav button").forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll("nav button").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    activeTab = b.dataset.tab;
    render();
  };
});

function updateDirLabel(){
  const tgt = lang === "tr" ? "TR" : "EN";
  document.getElementById("dirToggle").textContent = direction === "de-en" ? ("DE → " + tgt) : (tgt + " → DE");
}

document.getElementById("dirToggle").onclick = ()=>{
  direction = direction === "de-en" ? "en-de" : "de-en";
  updateDirLabel();
  revealed = false;
  buildQueue();
  currentSessionSize = queue.length || 1;
  current = queue[0] || null;
  renderStats();
  render();
};

document.getElementById("langSelect").value = lang;
document.getElementById("langSelect").onchange = (e)=>{
  lang = e.target.value;
  localStorage.setItem("lang-pref", lang);
  updateDirLabel();
  revealed = false;
  buildQueue();
  currentSessionSize = queue.length || 1;
  current = queue[0] || null;
  renderStats();
  render();
};

document.getElementById("resetLink").onclick = async ()=>{
  if(confirm("Gesamten Fortschritt löschen?")){
    progress = {};
    await saveProgress();
    buildQueue();
    currentSessionSize = queue.length || 1;
    current = queue[0] || null;
    revealed = false;
    renderStats();
    render();
  }
};

(async function init(){
  updateDirLabel();
  document.getElementById("sourceBar").textContent = "Lade Wortlisten…";
  const results = await loadWordData();
  renderSourceBar(results);
  await loadProgress();
  buildQueue();
  currentSessionSize = queue.length || 1;
  current = queue[0] || null;
  renderStats();
  render();
})();
</script>
</body>
</html>
