<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<title>Deutsch Wortschatz — Trainer</title>
<style>
  :root{
    --ink:#262420; --paper:#FAF7F1; --card:#FFFFFF;
    --line:#E4DECF; --accent:#7A4F2B; --accent-soft:#EFE3D2;
    --good:#3B6D11; --good-bg:#EAF3DE;
    --hard:#A32D2D; --hard-bg:#FCEBEB;
    --mid:#854F0B; --mid-bg:#FAEEDA;
    --muted:#8A8377;
    /* word-state progression: red (just reset) -> green (mastered) */
    --box0:#A32D2D; --box0-bg:#FCEBEB;
    --box1:#B5541E; --box1-bg:#FBE5D6;
    --box2:#BD7C13; --box2-bg:#FAEBD2;
    --box3:#83930F; --box3-bg:#EFF3D7;
    --skip:#5B6FA8; --skip-bg:#E8EAF6;
    --neu-fg:#8A8377; --neu-bg:#F1EFE8;
  }
  body.night-mode{
    --ink:#F2EDE4; --paper:#1B1916; --card:#252220;
    --line:#3B362F; --accent:#E0A868; --accent-soft:#3A2F22;
    --good:#8FCB5C; --good-bg:#243018;
    --hard:#FF6E6E; --hard-bg:#3A1F1F;
    --mid:#F0B23A; --mid-bg:#3A2C12;
    --muted:#A8A096;
    --box0:#FF6E6E; --box0-bg:#3A1F1F;
    --box1:#F08A4B; --box1-bg:#3A2818;
    --box2:#F0B23A; --box2-bg:#3A2C12;
    --box3:#C9D96B; --box3-bg:#2E3318;
    --skip:#93A8E8; --skip-bg:#232A40;
    --neu-fg:#A8A096; --neu-bg:#2C2924;
  }
  *{box-sizing:border-box; -webkit-text-size-adjust:100%; text-size-adjust:100%;}
  html{-webkit-tap-highlight-color:transparent;}
  body{
    margin:0; font-family:"Iowan Old Style","Palatino Linotype",Georgia,serif;
    background:var(--paper); color:var(--ink);
    padding:max(24px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(60px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
    font-size:17px;
    transition:background 0.2s, color 0.2s;
  }
  .wrap{max-width:640px; margin:0 auto;}
  header{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:20px; flex-wrap:wrap; gap:10px;}
  h1{font-size:26px; font-weight:600; margin:0; letter-spacing:0.2px;}
  .sub{font-family:Arial,Helvetica,sans-serif; font-size:14px; color:var(--muted); margin-top:3px;}
  nav{display:flex; gap:8px; margin-bottom:20px; font-family:Arial,sans-serif;}
  nav button{
    flex:1; font-family:inherit; font-size:15px; padding:12px 8px; cursor:pointer;
    background:var(--card); border:1px solid var(--line); border-radius:10px; color:var(--ink);
  }
  nav button.active{background:var(--accent); color:#fff; border-color:var(--accent);}

  .stats{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:16px; font-family:Arial,sans-serif;}
  .stat{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 8px; text-align:center;}
  .stat b{display:block; font-size:22px; font-family:Georgia,serif;}
  .stat span{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.4px;}

  .source-bar{font-family:Arial,sans-serif; font-size:12px; color:var(--muted); margin-bottom:18px; line-height:1.7;}
  .source-bar b{color:var(--accent); font-weight:600;}
  .source-tag{display:inline-block; background:var(--card); border:1px solid var(--line); border-radius:6px; padding:3px 8px; margin-right:6px;}
  .source-tag.ok::before{content:"●"; color:var(--good); margin-right:4px;}
  .source-tag.fallback::before{content:"●"; color:var(--mid); margin-right:4px;}

  #view{min-height:260px;}

  .card{
    position:relative; background:var(--card); border:1px solid var(--line); border-radius:18px;
    text-align:center; user-select:none; overflow:hidden;
    height:clamp(280px, 48vh, 460px);
    touch-action:pan-y;
  }
  .card-content{
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:14px; text-align:center;
    padding:44px 24px; pointer-events:none;
  }
  .card .cat{font-family:Arial,sans-serif; font-size:12px; color:var(--accent); text-transform:uppercase; letter-spacing:0.5px;}
  .card .word{font-size:38px; font-weight:600; line-height:1.2;}
  .card .ex{font-size:16px; color:var(--muted); font-style:italic; max-width:420px; line-height:1.4;}
  .card .hint{font-family:Arial,sans-serif; font-size:13px; color:var(--muted); margin-top:8px;}
  .card .answer{font-size:38px; font-weight:600; color:var(--hard);}
  .card .pos{font-family:Arial,sans-serif; font-size:11px; color:var(--muted); text-transform:uppercase;}

  .empty{text-align:center; padding:50px 20px; font-family:Arial,sans-serif; color:var(--muted); font-size:15px;}
  .empty b{display:block; font-size:19px; color:var(--ink); margin-bottom:8px; font-family:Georgia,serif;}

  .progressbar{height:6px; background:var(--line); border-radius:3px; overflow:hidden; margin-bottom:20px;}
  .progressbar div{height:100%; background:var(--accent);}

  .browse-list{display:flex; flex-direction:column; gap:8px; font-family:Arial,sans-serif;}
  .browse-row{
    display:flex; justify-content:space-between; align-items:center; gap:10px;
    background:var(--card); border:1px solid var(--line); border-radius:10px; padding:13px 14px; font-size:15px;
  }
  .browse-row .de{font-family:Georgia,serif; font-weight:600; font-size:16px;}
  .browse-row .box{
    display:inline-flex; align-items:center; gap:5px;
    font-size:11px; padding:4px 9px 4px 7px; border-radius:6px;
    background:var(--accent-soft); color:var(--accent); white-space:nowrap;
  }
  .box-dot{width:7px; height:7px; border-radius:50%; background:currentColor; flex:none;}
  .box.state-neu{background:var(--neu-bg); color:var(--neu-fg);}
  .box.state-skip{background:var(--skip-bg); color:var(--skip);}
  .box.state-box0{background:var(--box0-bg); color:var(--box0);}
  .box.state-box1{background:var(--box1-bg); color:var(--box1);}
  .box.state-box2{background:var(--box2-bg); color:var(--box2);}
  .box.state-box3{background:var(--box3-bg); color:var(--box3);}
  .box.state-mastered{background:var(--good-bg); color:var(--good);}
  .cat-head{font-family:Arial,sans-serif; font-size:12px; text-transform:uppercase; letter-spacing:0.5px; color:var(--muted); margin:18px 0 6px;}
  .cat-filter{font-family:Arial,sans-serif; font-size:15px; padding:10px 12px; border-radius:10px; border:1px solid var(--line); background:var(--card); color:var(--ink); margin-bottom:16px; width:100%;}

  .reset-link{font-family:Arial,sans-serif; font-size:13px; color:var(--muted); text-align:center; margin-top:34px; cursor:pointer; text-decoration:underline; padding:10px;}

  #ruheToggle.active{background:var(--accent); color:#fff; border-color:var(--accent);}
  #nightToggle.active{background:var(--ink); color:var(--paper); border-color:var(--ink);}

  #lowExitBtn{display:none;}
  body.low-attn-active{padding:0; margin:0; overflow:hidden;}
  body.low-attn-active .wrap{max-width:none; margin:0;}
  body.low-attn-active header,
  body.low-attn-active .stats,
  body.low-attn-active .source-bar,
  body.low-attn-active nav,
  body.low-attn-active .reset-link{display:none;}
  body.low-attn-active #lowExitBtn{
    display:block; position:fixed; top:max(14px, env(safe-area-inset-top));
    right:max(14px, env(safe-area-inset-right)); z-index:10;
    width:38px; height:38px; border-radius:50%; border:1px solid var(--line);
    background:var(--card); color:var(--muted); font-size:16px; line-height:1;
    cursor:pointer;
  }
  .low-attn{
    position:relative; height:100vh; height:100dvh; width:100%;
    overflow:hidden; user-select:none;
  }
  .low-text{
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:18px; text-align:center;
    padding:0 6vw; pointer-events:none;
  }
  .low-word{font-size:clamp(40px, 12vw, 92px); max-width:90vw; font-weight:600; line-height:1.15; word-break:break-word;}
  .low-answer{font-size:clamp(40px, 12vw, 92px); font-weight:600; max-width:90vw; color:var(--hard); line-height:1.2; word-break:break-word;}

  .zones{
    position:absolute; inset:0; z-index:5; display:grid;
    grid-template-columns:22% 56% 22%; grid-template-rows:20% 60% 20%;
  }
  .lz{display:flex; align-items:center; justify-content:center; cursor:pointer;}
  .lz:active{background:rgba(122,79,43,0.06);}
  .lz-top{grid-column:1/4; grid-row:1; align-items:flex-start; padding-top:max(10px, env(safe-area-inset-top));}
  .lz-bottom{grid-column:1/4; grid-row:3; align-items:flex-end; padding-bottom:max(10px, env(safe-area-inset-bottom));}
  .lz-left{grid-column:1; grid-row:2; justify-content:flex-start; padding-left:max(10px, env(safe-area-inset-left));}
  .lz-right{grid-column:3; grid-row:2; justify-content:flex-end; padding-right:max(10px, env(safe-area-inset-right));}
  .lz-center{grid-column:2; grid-row:2;}
  .lz-label{font-family:Arial,sans-serif; font-size:12px; color:var(--muted); opacity:0.55;}
  .lz-label.lz-good{color:var(--good); opacity:0.85;}
  .low-attn .lz-left .lz-label, .low-attn .lz-right .lz-label{font-size:22px;}
  .card .lz-label{font-size:11px;}

  @media (orientation:landscape){
    .low-word{font-size:clamp(40px, 8.5vw, 100px); max-width:94vw;}
    .low-answer{font-size:clamp(40px, 8.5vw, 100px); max-width:94vw;}
    .low-attn .zones{grid-template-columns:16% 68% 16%; grid-template-rows:24% 52% 24%;}
  }
</style>
</head>
<body>
<div class="wrap">

        <option value="custom">Eigene Liste</option>

      <button id="ruheToggle" style="font-family:Arial,sans-serif;font-size:14px;font-weight:600;padding:10px 14px;border-radius:10px;border:1px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer;white-space:nowrap;">Ruhemodus</button>
      <button id="nightToggle" style="font-family:Arial,sans-serif;font-size:14px;font-weight:600;padding:10px 14px;border-radius:10px;border:1px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer;white-space:nowrap;">Nachtmodus</button>
    </div>
  </header>

  <div class="stats" id="stats"></div>
  <div class="source-bar" id="sourceBar">Lade Wortlisten…</div>

  <nav>
    <button data-tab="study" class="active">Heute üben</button>
    <button data-tab="browse">Alle Wörter</button>
  </nav>

  <div id="view"></div>
  <div class="reset-link" id="resetLink">Fortschritt zurücksetzen</div>
</div>
<button id="lowExitBtn">✕</button>

"zurück","en":"back, return","cat":"Goethe B1","ex":"Bitte eine Fahrkarte nach Frankfurt und zurück!","pos":"","tr":"geri, dönüş"},{"de":"zusagen","en":"to accept, to agree","cat":"Goethe B1","ex":"Meine Eltern haben uns zum Essen eingeladen. Ich habe zugesagt.","pos":"","tr":"kabul etmek"},{"de":"zusammen","en":"together","cat":"Goethe B1","ex":"Wir haben als Kinder oft zusammen gespielt.","pos":"","tr":"birlikte, beraber"},{"de":"die Zusammenarbeit","en":"cooperation, collaboration","cat":"Goethe B1","ex":"Auf gute Zusammenarbeit!","pos":"","tr":"iş birliği"},{"de":"zusammenfassen","en":"to summarize","cat":"Goethe B1","ex":"Können Sie das bitte noch einmal kurz zusammenfassen?","pos":"","tr":"özetlemek"},{"de":"der Zusammenhang","en":"context, connection","cat":"Goethe B1","ex":"In diesem Zusammenhang möchte ich Sie auf zwei Bücher aufmerksam machen.","pos":"","tr":"bağlam, ilişki"},{"de":"zusätzlich","en":"additional, extra","cat":"Goethe B1","ex":"Sie müssen in Zukunft eine Stunde zusätzlich arbeiten.","pos":"","tr":"ek, ilave"},{"de":"zuschauen","en":"to watch, to observe","cat":"Goethe B1","ex":"Nein, ich schaue lieber nur zu.","pos":"","tr":"izlemek, seyretmek"},{"de":"der Zuschauer","en":"viewer, spectator","cat":"Goethe B1","ex":"Liebe Zuschauer, wir wünschen Ihnen gute Unterhaltung.","pos":"","tr":"izleyici, seyirci"},{"de":"der Zuschlag","en":"surcharge, supplement","cat":"Goethe B1","ex":"Für diesen Zug müssen Sie einen Zuschlag zahlen.","pos":"","tr":"ek ücret"},{"de":"der Zustand","en":"condition, state","cat":"Goethe B1","ex":"Die Wohnung war in sehr schlechtem Zustand.","pos":"","tr":"durum, hal"},{"de":"zuständig","en":"responsible, in charge","cat":"Goethe B1","ex":"Wer ist dafür zuständig?","pos":"","tr":"yetkili, sorumlu"},{"de":"zustimmen","en":"to agree, to consent","cat":"Goethe B1","ex":"Ich stimme dir in dieser Sache völlig zu.","pos":"","tr":"onaylamak, razı olmak"},{"de":"die Zustimmung","en":"approval, consent","cat":"Goethe B1","ex":"Wi <script>
// ---- Configuration: list of CSV lookup files this app will try to load ----
// Each file is tagged with a difficulty level. "custom" files are your own
// curated word lists; "a1"/"a2"/"b1" map to the official Goethe-Institut
// Wortliste content. To add a new category later: drop a new CSV (columns:
// de,en,cat,ex,pos,tr) next to this HTML file, add it below with its level,
// and (optionally) add its data to the fallback bundle above so it also
// works when opened without a local server.
const FILE_LEVELS = {
  "core-a2-b1.csv": "custom",
  "business-office.csv": "custom",
  "frequency-862.csv": "custom",
  "extra-topics.csv": "custom",
  "new-topics.csv": "custom",
  "goethe-a1.csv": "a1",
  "goethe-a2.csv": "a2",
  "goethe-b1.csv": "b1",
};
const CSV_FILES = Object.keys(FILE_LEVELS);
const LEVEL_LABELS = {custom:"Eigene Liste", a1:"A1", a2:"A2", b1:"B1"};

const DAILY_NEW_LIMIT = 12;
const STORAGE_KEY = "progress-v2";
let progress = {};
let sessionWords = []; // stable ordered list for today's session (doesn't shrink, navigated via cardIndex)
let cardIndex = 0;
let current = null;
let revealed = false;
let activeTab = "study";
let browseFilter = "alle";
let WORD_DATA = [];
let freshPool = [];
let freshOffset = 0;
let direction = "de-en"; // "de-en" = recognize German, "en-de" = produce German
let lang = localStorage.getItem("lang-pref") || "en"; // "en" or "tr" — target language
let level = localStorage.getItem("word-level") || "custom"; // "custom" | "a1" | "a2" | "b1"
let lowAttentionToggle = localStorage.getItem("low-attention") === "1";
let nightMode = localStorage.getItem("night-mode") === "1";
const loadStatus = {};

function levelWords(){ return WORD_DATA.filter(w => w.level === level); }

function isLandscapeTouch(){
  return window.matchMedia("(orientation: landscape)").matches && window.matchMedia("(pointer: coarse)").matches;
}
function lowAttentionActive(){
  if(typeof landscapeOverride !== "undefined" && landscapeOverride) return lowAttentionToggle;
  return lowAttentionToggle || isLandscapeTouch();
}

function keyFor(word){ return word.de + "|" + direction + "|" + lang; }
function targetField(){ return lang === "tr" ? "tr" : "en"; }
function todayStamp(){ return Math.floor(Date.now()/86400000); }

// ---- Minimal RFC4126-style CSV parser (handles quoted fields with commas) ----
function parseCSV(text){
  const rows = [];
  let row = [], field = "", inQuotes = false;
  for(let i=0;i<text.length;i++){
    const c = text[i];
    if(inQuotes){
      if(c === '"'){
        if(text[i+1] === '"'){ field += '"'; i++; }
        else inQuotes = false;
      } else field += c;
    } else {
      if(c === '"') inQuotes = true;
      else if(c === ','){ row.push(field); field = ""; }
      else if(c === '\n'){ row.push(field); rows.push(row); row = []; field = ""; }
      else if(c === '\r'){ /* skip */ }
      else field += c;
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  if(!rows.length) return [];
  const header = rows[0].map(h=>h.trim());
  return rows.slice(1).filter(r=>r.length>1 || r[0]).map(r=>{
    const obj = {};
    header.forEach((h,idx)=>{ obj[h] = (r[idx]||"").trim(); });
    return obj;
  });
}

async function loadWordData(){
  const fallback = JSON.parse(document.getElementById("fallback-data").textContent);
  const seenByLevel = {}; // dedup within each level's own pool, not across levels
  const sourceResults = [];

  for(const filename of CSV_FILES){
    let rows = null;
    let mode = "fallback";
    try{
      const res = await fetch(filename);
      if(res.ok){
        const text = await res.text();
        rows = parseCSV(text);
        mode = "fetched";
      }
    }catch(e){ /* file:// fetch blocked, or file missing — fall back below */ }

    if(!rows || !rows.length){
      rows = fallback[filename] || [];
      mode = rows.length ? "fallback" : "missing";
    }

    const wordLevel = FILE_LEVELS[filename] || "custom";
    const seen = seenByLevel[wordLevel] || (seenByLevel[wordLevel] = new Set());
    let added = 0;
    rows.forEach(r=>{
      if(!r.de || seen.has(r.de)) return;
      seen.add(r.de);
      WORD_DATA.push({de:r.de, en:r.en, tr:r.tr||"", cat:r.cat||"Sonstiges", ex:r.ex||"", pos:r.pos||"", level:wordLevel});
      added++;
    });
    sourceResults.push({filename, mode, count: added});
  }
  return sourceResults;
}

function renderSourceBar(results){
  const bar = document.getElementById("sourceBar");
  bar.innerHTML = results.map(r=>{
    const cls = r.mode === "fetched" ? "ok" : (r.mode === "fallback" ? "fallback" : "ok");
    const label = r.mode === "fetched" ? "live" : (r.mode === "fallback" ? "eingebettet" : "fehlt");
    return `<span class="source-tag ${cls}">${r.filename} · ${r.count} (${label})</span>`;
  }).join(" ");
}

async function loadProgress(){
  try{
    const r = localStorage.getItem(STORAGE_KEY);
    progress = r ? JSON.parse(r) : {};
  }catch(e){ progress = {}; }
}
async function saveProgress(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); }
  catch(e){ console.error("save failed", e); }
}

function ensureEntry(word){
  const k = keyFor(word);
  if(!progress[k]) progress[k] = {box:0, due:todayStamp(), seen:0, streak:0};
  return progress[k];
}

const BOX_INTERVAL = [0,1,2,4,8,16];

function buildQueue(offset){
  const today = todayStamp();
  const due = [];
  const fresh = [];
  levelWords().forEach(w=>{
    const p = progress[keyFor(w)];
    if(p){
      if(p.due <= today) due.push(w);
    } else {
      fresh.push(w);
    }
  });
  due.sort(()=>Math.random()-0.5);
  fresh.sort(()=>Math.random()-0.5);
  freshPool = fresh;
  freshOffset = offset || 0;
  const newOnes = freshPool.slice(freshOffset, freshOffset + DAILY_NEW_LIMIT);
  freshOffset += newOnes.length;
  sessionWords = due.concat(newOnes);
  cardIndex = 0;
  current = sessionWords[0] || null;
}

// Appends the next batch of fresh words to the session without resetting position.
// Returns true if more words were appended, false if nothing left to add.
function extendSession(){
  const newOnes = freshPool.slice(freshOffset, freshOffset + DAILY_NEW_LIMIT);
  if(newOnes.length){
    freshOffset += newOnes.length;
    sessionWords = sessionWords.concat(newOnes);
    return true;
  }
  return false;
}

function loadMore(){
  extendSession();
  current = sessionWords[cardIndex] || null;
  renderStudy();
}

function grade(word, level){
  const p = ensureEntry(word);
  p.seen += 1;
  if(level === "again"){ p.box = 0; p.streak = 0; }
  else if(level === "hard"){ p.box = Math.max(0, p.box); p.streak += 1; }
  else if(level === "good"){ p.box = Math.min(5, p.box+1); p.streak += 1; }
  else if(level === "easy"){ p.box = Math.min(5, p.box+2); p.streak += 1; }
  p.due = todayStamp() + BOX_INTERVAL[p.box];
  saveProgress();
}

function skipCard(){
  if(!current || sessionWords.length === 0) return;
  const word = sessionWords.splice(cardIndex, 1)[0];
  sessionWords.push(word);
  const p = ensureEntry(word);
  p.skipped = (p.skipped || 0) + 1;
  p.due = todayStamp();
  saveProgress();
  revealed = false;
  current = sessionWords[cardIndex] || null;
  renderStudy();
}

// Low Attention Mode navigation — pure browsing, no grading, no persisted skip.
function lowAttnNext(){
  if(cardIndex < sessionWords.length - 1){
    cardIndex++;
  } else if(extendSession()){
    cardIndex++;
  } else if(sessionWords.length > 0){
    cardIndex = 0; // loop back so passive flipping never dead-ends
  }
  current = sessionWords[cardIndex] || null;
  revealed = false;
  render();
}
function lowAttnPrev(){
  if(cardIndex > 0){
    cardIndex--;
  } else {
    cardIndex = Math.max(0, sessionWords.length - 1); // wrap to last
  }
  current = sessionWords[cardIndex] || null;
  revealed = false;
  render();
}

// Grades the current card (e.g. "good" for swipe-down "I know it", "again" for
// swipe-up "I don't know it, keep it in the loop"), then advances like lowAttnNext.
function lowAttnGrade(level){
  if(!current) return;
  grade(current, level);
  if(cardIndex < sessionWords.length - 1){
    cardIndex++;
  } else if(extendSession()){
    cardIndex++;
  } else {
    cardIndex = 0;
  }
  current = sessionWords[cardIndex] || null;
  revealed = false;
  renderStats();
  render();
}

// Normal-mode grading: same idea as lowAttnGrade but advances into the
// "session exhausted" end screens instead of looping forever.
function gradeAndAdvance(level){
  if(!current) return;
  grade(current, level);
  cardIndex++;
  revealed = false;
  current = sessionWords[cardIndex] || null;
  renderStats();
  renderStudy();
}

function studyPrev(){
  if(cardIndex > 0){
    cardIndex--;
    current = sessionWords[cardIndex] || null;
    revealed = false;
    renderStudy();
  }
}

function zonesHTML(labels){
  return `
    <div class="zones" id="cardZones">
      <div class="lz lz-top" data-action="up"><span class="lz-label">${labels.up}</span></div>
      <div class="lz lz-left" data-action="prev"><span class="lz-label">${labels.left}</span></div>
      <div class="lz lz-center" data-action="flip"></div>
      <div class="lz lz-right" data-action="next"><span class="lz-label">${labels.right}</span></div>
      <div class="lz lz-bottom" data-action="down"><span class="lz-label lz-good">${labels.down}</span></div>
    </div>
  `;
}

// Wires click + swipe gestures onto a zones overlay. `actions` maps
// "prev"/"next"/"up"/"down"/"flip" to callback functions.
function attachZoneGestures(zonesEl, actions){
  let sx = 0, sy = 0, swiped = false;
  function runAction(name){
    const fn = actions[name];
    if(fn) fn();
  }
  zonesEl.querySelectorAll(".lz").forEach(zoneEl=>{
    zoneEl.onclick = ()=>{
      if(swiped){ swiped = false; return; }
      runAction(zoneEl.dataset.action);
    };
  });
  zonesEl.addEventListener("touchstart", (e)=>{
    sx = e.changedTouches[0].clientX;
    sy = e.changedTouches[0].clientY;
    swiped = false;
  }, {passive:true});
  zonesEl.addEventListener("touchmove", (e)=>{
    const dx = e.changedTouches[0].clientX - sx;
    const dy = e.changedTouches[0].clientY - sy;
    if(Math.abs(dx) > 25 || Math.abs(dy) > 25) swiped = true;
  }, {passive:true});
  zonesEl.addEventListener("touchend", (e)=>{
    const dx = e.changedTouches[0].clientX - sx;
    const dy = e.changedTouches[0].clientY - sy;
    if(Math.abs(dx) > 45 && Math.abs(dx) > Math.abs(dy)){
      e.preventDefault();
      runAction(dx > 0 ? "next" : "prev");
    } else if(Math.abs(dy) > 45 && Math.abs(dy) > Math.abs(dx)){
      e.preventDefault();
      runAction(dy > 0 ? "down" : "up");
    }
  });
}

function computeStats(){
  const today = todayStamp();
  const words = levelWords();
  let learned = 0, dueToday = 0, mastered = 0;
  words.forEach(w=>{
    const p = progress[keyFor(w)];
    if(p && p.seen > 0){
      learned++;
      if(p.due <= today) dueToday++;
      if(p.box >= 4) mastered++;
    }
  });
  return {learned, total: words.length, dueToday, mastered};
}

function renderStats(){
  const s = computeStats();
  document.getElementById("stats").innerHTML = `
    <div class="stat"><b>${s.learned}</b><span>gelernt</span></div>
    <div class="stat"><b>${s.total - s.learned}</b><span>neu</span></div>
    <div class="stat"><b>${s.mastered}</b><span>gefestigt</span></div>
    <div class="stat"><b>${s.total}</b><span>total</span></div>
  `;
}

function renderStudy(){
  const view = document.getElementById("view");
  if(lowAttentionActive()){
    renderLowAttention(view);
    return;
  }
  if(levelWords().length === 0){
    view.innerHTML = `<div class="empty"><b>Diese Wortliste ist noch nicht verfügbar.</b>Wähle ein anderes Niveau oben (z. B. "Eigene Liste" oder "A1").</div>`;
    return;
  }
  if(cardIndex >= sessionWords.length){
    const remaining = freshPool.length - freshOffset;
    if(remaining > 0){
      view.innerHTML = `<div class="empty"><b>Erste Runde geschafft!</b>Du kannst hier aufhören oder direkt weitermachen.<br><span style="display:inline-block;margin-top:14px;">${remaining} weitere neue Wörter warten.</span>
        <div style="margin-top:18px;"><button id="loadMoreBtn" style="font-family:Arial,sans-serif;font-size:14px;font-weight:600;padding:10px 18px;border-radius:10px;border:1px solid var(--accent);background:var(--accent-soft);color:var(--accent);cursor:pointer;">Weiter üben (+${Math.min(DAILY_NEW_LIMIT, remaining)})</button></div>
      </div>`;
      document.getElementById("loadMoreBtn").onclick = loadMore;
    } else {
      view.innerHTML = `<div class="empty"><b>Für heute geschafft!</b>Alle Wörter sind durchgenommen. Komm morgen wieder für die Wiederholung.<br>Du kannst inzwischen unter "Alle Wörter" stöbern.</div>`;
    }
    return;
  }
  const seenSoFar = cardIndex;
  const totalForBar = sessionWords.length || 1;
  const target = current[targetField()] || current.en;
  const prompt = direction === "de-en" ? current.de : target;
  const answer = direction === "de-en" ? target : current.de;
  view.innerHTML = `
    <div class="progressbar"><div style="width:${(seenSoFar/totalForBar*100)||0}%"></div></div>
    <div class="card" id="cardEl">
      <div class="card-content">
        <div class="cat">${current.cat}${current.pos ? " · " + current.pos : ""}</div>
        <div class="word">${prompt}</div>
        ${revealed ? `<div class="answer">${answer}</div>${current.ex ? `<div class="ex">${current.ex}</div>` : ""}` : `<div class="hint">Tippen zum Aufdecken</div>`}
      </div>
      ${zonesHTML({up:"↑ weiß ich nicht", down:"↓ weiß ich", left:"‹", right:"› überspringen"})}
    </div>
  `;
  attachZoneGestures(document.getElementById("cardZones"), {
    prev: studyPrev,
    next: skipCard,
    up: ()=>gradeAndAdvance("again"),
    down: ()=>gradeAndAdvance("good"),
    flip: ()=>{ revealed = !revealed; renderStudy(); }
  });
}

function renderLowAttention(view){
  document.body.classList.add("low-attn-active");
  if(!current){
    view.innerHTML = `<div class="low-attn"><div class="low-text"><div class="low-word">Fertig für heute</div></div></div>`;
    return;
  }
  const target = current[targetField()] || current.en;
  const prompt = direction === "de-en" ? current.de : target;
  const answer = direction === "de-en" ? target : current.de;
  view.innerHTML = `
    <div class="low-attn" id="lowCard">
      <div class="low-text">
        <div class="low-word">${prompt}</div>
        ${revealed ? `<div class="low-answer">${answer}</div>` : ""}
      </div>
      ${zonesHTML({up:"↑ weiß ich nicht", down:"↓ weiß ich", left:"‹", right:"›"})}
    </div>
  `;
  attachZoneGestures(document.getElementById("cardZones"), {
    prev: lowAttnPrev,
    next: lowAttnNext,
    up: ()=>lowAttnGrade("again"),
    down: ()=>lowAttnGrade("good"),
    flip: ()=>{ revealed = !revealed; render(); }
  });
}

// Maps a word's progress entry to a label + a distinct color class for the browse list.
const BOX_LABELS = ["Neu gelernt", "In Übung", "Vertraut", "Fast gefestigt"];
function stateInfo(p){
  if(!p) return {label:"neu", cls:"state-neu"};
  if(p.seen === 0) return {label:"übersprungen", cls:"state-skip"};
  if(p.box >= 4) return {label:"gefestigt", cls:"state-mastered"};
  return {label:BOX_LABELS[p.box], cls:"state-box" + p.box};
}

function renderBrowse(){
  const view = document.getElementById("view");
  const words = levelWords();
  if(words.length === 0){
    view.innerHTML = `<div class="empty"><b>Diese Wortliste ist noch nicht verfügbar.</b>Wähle ein anderes Niveau oben.</div>`;
    return;
  }
  const allCats = Array.from(new Set(words.map(w=>w.cat)));
  let html = `<select class="cat-filter" id="catFilter"><option value="alle">Alle Kategorien</option>${allCats.map(c=>`<option value="${c}" ${browseFilter===c?"selected":""}>${c}</option>`).join("")}</select>`;
  const cats = {};
  words.forEach(w=>{
    if(browseFilter !== "alle" && w.cat !== browseFilter) return;
    (cats[w.cat] = cats[w.cat]||[]).push(w);
  });
  Object.keys(cats).forEach(cat=>{
    html += `<div class="cat-head">${cat}</div><div class="browse-list">`;
    cats[cat].forEach(w=>{
      const p = progress[keyFor(w)];
      const s = stateInfo(p);
      const target = w[targetField()] || w.en;
      const left = direction === "de-en" ? w.de : target;
      const right = direction === "de-en" ? target : w.de;
      html += `<div class="browse-row"><div><span class="de">${left}</span> — ${right}</div><div class="box ${s.cls}"><span class="box-dot"></span>${s.label}</div></div>`;
    });
    html += `</div>`;
  });
  view.innerHTML = html;
  document.getElementById("catFilter").onchange = (e)=>{ browseFilter = e.target.value; renderBrowse(); };
}

function render(){
  if(lowAttentionActive()){
    renderStudy(); // renderStudy delegates to renderLowAttention internally
    return;
  }
  document.body.classList.remove("low-attn-active");
  if(activeTab === "study") renderStudy();
  else renderBrowse();
}

document.querySelectorAll("nav button").forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll("nav button").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    activeTab = b.dataset.tab;
    render();
  };
});

function updateDirLabel(){
  const tgt = lang === "tr" ? "TR" : "EN";
  document.getElementById("dirToggle").textContent = direction === "de-en" ? ("DE → " + tgt) : (tgt + " → DE");
}

document.getElementById("dirToggle").onclick = ()=>{
  direction = direction === "de-en" ? "en-de" : "de-en";
  updateDirLabel();
  revealed = false;
  buildQueue();
  renderStats();
  render();
};

document.getElementById("langSelect").value = lang;
document.getElementById("langSelect").onchange = (e)=>{
  lang = e.target.value;
  localStorage.setItem("lang-pref", lang);
  updateDirLabel();
  revealed = false;
  buildQueue();
  renderStats();
  render();
};

document.getElementById("levelSelect").value = level;
document.getElementById("levelSelect").onchange = (e)=>{
  level = e.target.value;
  localStorage.setItem("word-level", level);
  browseFilter = "alle";
  revealed = false;
  buildQueue();
  renderStats();
  render();
};

document.getElementById("resetLink").onclick = async ()=>{
  if(confirm("Gesamten Fortschritt löschen?")){
    progress = {};
    await saveProgress();
    buildQueue();
    revealed = false;
    renderStats();
    render();
  }
};

let landscapeOverride = false;
let lastLandscapeState = isLandscapeTouch();
function handleViewportChange(){
  const nowLandscape = isLandscapeTouch();
  if(nowLandscape !== lastLandscapeState){
    landscapeOverride = false;
    lastLandscapeState = nowLandscape;
  }
  render();
}
window.addEventListener("resize", handleViewportChange);
window.addEventListener("orientationchange", handleViewportChange);

function updateRuheBtn(){
  const btn = document.getElementById("ruheToggle");
  if(btn) btn.classList.toggle("active", lowAttentionToggle);
}

function applyNightMode(){
  document.body.classList.toggle("night-mode", nightMode);
  const btn = document.getElementById("nightToggle");
  if(btn) btn.classList.toggle("active", nightMode);
}

document.getElementById("nightToggle").onclick = ()=>{
  nightMode = !nightMode;
  localStorage.setItem("night-mode", nightMode ? "1" : "0");
  applyNightMode();
};

document.getElementById("ruheToggle").onclick = ()=>{
  lowAttentionToggle = !lowAttentionToggle;
  localStorage.setItem("low-attention", lowAttentionToggle ? "1" : "0");
  landscapeOverride = false;
  updateRuheBtn();
  render();
};

document.getElementById("lowExitBtn").onclick = ()=>{
  if(lowAttentionToggle){
    lowAttentionToggle = false;
    localStorage.setItem("low-attention", "0");
    updateRuheBtn();
  } else if(isLandscapeTouch()){
    landscapeOverride = true;
  }
  render();
};

(async function init(){
  updateDirLabel();
  updateRuheBtn();
  applyNightMode();
  document.getElementById("sourceBar").textContent = "Lade Wortlisten…";
  const results = await loadWordData();
  renderSourceBar(results);
  await loadProgress();
  buildQueue();
  renderStats();
  render();
})();
</script>
</body>
</html>
